<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
        }

            /* DARK MODE */
            body.dark {
                background: #0f172a;
                color: #e2e8f0;
            }

                body.dark .card {
                    background: #1e293b;
                    color: white;
                }

                body.dark .sidebar {
                    background: #020617;
                }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

            .sidebar a {
                display: block;
                color: white;
                text-decoration: none;
                padding: 10px;
                border-radius: 8px;
                margin-bottom: 10px;
                transition: 0.3s;
            }

                .sidebar a:hover {
                    background: #334155;
                }

        /* MAIN */
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        /* PROFILE ICON */
        .profile-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* DROPDOWN BONITO */
        .dropdown-menu {
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: none;
            min-width: 220px;
        }

        .dropdown-item {
            border-radius: 8px;
            transition: 0.2s;
        }

            .dropdown-item:hover {
                background-color: #f1f5f9;
            }

        .dropdown-header {
            font-weight: bold;
            font-size: 15px;
        }

        /* DARK MODE DROPDOWN */
        body.dark .dropdown-menu {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: white;
        }

        body.dark .dropdown-item-text {
            color: #94a3b8 !important;
            font-size: 13px;
        }

        body.dark .dropdown-item {
            color: #e2e8f0;
        }

            body.dark .dropdown-item:hover {
                background-color: #334155;
                color: white;
            }

        body.dark .dropdown-header {
            color: #94a3b8;
        }

        body.dark .dropdown-divider {
            border-color: #334155;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <a href="{{ url_for('dashboard') }}">
            <i class="fa-solid fa-house"></i> Dashboard
        </a>

        <a href="{{ url_for('ver_archivos') }}">
            <i class="fa-solid fa-folder"></i> Archivos
        </a>

        <a href="{{ url_for('pokemon') }}">
            <i class="fa-solid fa-gamepad"></i> Pokédex
        </a>

        {% if usuario_rol == 'admin' %}
        <a href="{{ url_for('admin_panel', token=admin_token) }}">
            <i class="fa-solid fa-user-shield"></i> Admin
        </a>
        {% endif %}

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- PROFILE DROPDOWN -->
        <div class="topbar">
            <div class="dropdown">
                <div class="profile-icon dropdown-toggle" data-bs-toggle="dropdown">
                    {{ usuario[0]|upper }}
                </div>

                <ul class="dropdown-menu dropdown-menu-end">

                    <!-- PERFIL -->
                    <li class="text-center mb-2">
                        <div class="profile-icon mx-auto mb-2">
                            {{ usuario[0]|upper }}
                        </div>
                        <strong>{{ usuario }}</strong>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <!-- INFO -->
                    <li>
                        <small class="dropdown-item-text">🌐 IP: {{ ip }}</small>
                    </li>
                    <li>
                        <small class="dropdown-item-text">💻 Sistema: {{ sistema }}</small>
                    </li>

                    <li><hr class="dropdown-divider"></li>

                    <!-- DARK MODE -->
                    <li>
                        <button class="dropdown-item" onclick="toggleDark()">
                            🌙 Modo oscuro
                        </button>
                    </li>

                    <!-- LOGOUT -->
                    <li>
                        <a class="dropdown-item text-danger" href="{{ url_for('logout') }}">
                            <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
                        </a>
                    </li>

                </ul>
            </div>
        </div>

        <!-- CONTENIDO -->
        {% block content %}{% endblock %}

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DARK MODE SCRIPT -->
    <script>
        function toggleDark() {
            document.body.classList.toggle("dark");
            localStorage.setItem("dark", document.body.classList.contains("dark") ? "1" : "0");
        }

        if (localStorage.getItem("dark") === "1") {
            document.body.classList.add("dark");
        }
    </script>

</body>
</html>
