<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin-top: 60px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        h3 {
            color: #1d4ed8;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-custom {
            width: 100%;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3><i class="fa-solid fa-key"></i> Asignar nueva contraseña</h3>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="nueva_clave" class="form-label">Nueva contraseña:</label>
                <input type="password" name="nueva_clave" id="nueva_clave" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success btn-custom"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
            <a href="{{ url_for('admin_panel', token=ADMIN_TOKEN) }}" class="btn btn-secondary btn-custom mt-2"><i class="fa-solid fa-ban"></i> Cancelar</a>
        </form>
    </div>
</body>
</html>
