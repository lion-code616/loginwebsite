<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #111827;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #60a5fa;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
        }

        .btn-custom {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

            .btn-custom:hover {
                background: #3b82f6;
                transform: translateY(-2px);
            }

        .alert {
            margin-top: 15px;
            border-radius: 8px;
        }

        a {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #93c5fd;
            text-decoration: none;
        }

            a:hover {
                text-decoration: underline;
            }
    </style>
</head>
<body>
    <div class="container">
        <h2>Recuperar Contraseña</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="usuario" placeholder="Nombre de usuario" class="form-control" required>
            <input type="email" name="correo" placeholder="Correo electronico" class="form-control" required>
            <button type="submit" class="btn btn-custom">Crear Ticket</button>
        </form>

        {% if mensaje %}
        <div class="alert alert-info">{{ mensaje }}</div>
        {% endif %}

        <a href="{{ url_for('login') }}">⬅ Volver al login</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
